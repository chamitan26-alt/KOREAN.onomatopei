<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
シムさんと楽しく学ぶ韓国語
</title>


<link rel="stylesheet" href="style.css?v=13">

</head>


<body>


<div class="container">


<h1>
🌸 シムさんと楽しく学ぶ韓国語
</h1>


<p class="subtitle">
韓国語オノマトペクイズ
</p>



<!-- スタート画面 -->

<div id="startArea">


<p>
楽しく覚えて<br>
韓国語をもっと身近に♪
</p>


<button id="startButton">
10問チャレンジ開始
</button>


</div>





<!-- クイズ画面 -->

<div id="quizArea" style="display:none;">



<div id="score" class="score">
現在の得点：0 / 10
</div>




<div id="question">
問題を読み込み中…
</div>




<div id="choices"></div>




<div id="result"></div>




<div id="explanation"></div>




<div id="nextArea">


<button id="nextButton" style="display:none;">
次の問題へ
</button>


</div>




</div>




</div>




<script src="script.js?v=13"></script>


</body>

</html>
